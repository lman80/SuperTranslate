appId: com.brimmer.supertranslate
productName: SuperTranslate
# The native module ships an N-API prebuilt binary that already loads under
# Electron; don't recompile it from source (avoids node-gyp/Python issues).
npmRebuild: false
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
asarUnpack:
  - '**/node_modules/audiotee/bin/**'
  - '**/node_modules/screencapturekit-audio-capture/**'
  - '**/*.node'
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: SuperTranslate uses your microphone to transcribe and translate what you say.
    NSAudioCaptureUsageDescription: SuperTranslate captures system audio so it can transcribe and translate the other person on your call.
win:
  target: nsis
  artifactName: ${productName}-${version}-setup.${ext}
  # The macOS-only native modules are never used on Windows — keep them out of the package.
  files:
    - '!**/node_modules/audiotee/**'
    - '!**/node_modules/screencapturekit-audio-capture/**'
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
